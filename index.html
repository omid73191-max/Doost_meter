<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Doost Meter</title>

  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panelSoft: #1d212b;
      --text: #f5f7fb;
      --line: rgba(255,255,255,0.08);
      --shadow: 0 12px 30px rgba(0,0,0,0.35);
      --btnBg: #232938;
      --btnLine: rgba(255,255,255,0.1);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, #1a1f29 0%, #0f1115 45%, #0b0d12 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      padding: 20px 16px 32px;
      text-align: center;
      position: relative;
    }

    h1 {
      margin: 10px 0 22px;
      font-size: clamp(30px, 7vw, 56px);
      font-weight: 800;
      color: var(--text);
    }

    .container {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    .card {
      width: 100%;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panelSoft) 100%);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 18px 16px 20px;
      box-shadow: var(--shadow);
    }

    .nameInput {
      width: 100%;
      background: transparent;
      color: var(--text);
      font-size: clamp(24px, 8vw, 48px);
      font-weight: 800;
      text-align: center;
      border: none;
      border-bottom: 1px solid var(--line);
      margin-bottom: 14px;
      padding: 2px 6px 12px;
      outline: none;
    }

    .score {
      font-size: clamp(64px, 22vw, 120px);
      line-height: 1;
      font-weight: 800;
      margin: 18px 0 20px;
      color: var(--text);
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 14px;
    }

    .scoreBtn {
      width: clamp(72px, 20vw, 88px);
      height: clamp(72px, 20vw, 88px);
      border-radius: 22px;
      border: 1px solid var(--btnLine);
      background: var(--btnBg);
      color: var(--text);
      font-size: clamp(34px, 8vw, 42px);
      cursor: pointer;
      transition: transform 0.08s ease, background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .scoreBtn:active {
      transform: scale(0.96);
    }

    .heart {
      font-size: clamp(86px, 22vw, 130px);
      line-height: 1;
      margin: 2px 0;
      filter: drop-shadow(0 6px 14px rgba(255, 77, 109, 0.25));
    }

    .effectsLayer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 9999;
    }

    .confetti {
      position: absolute;
      top: -10vh;
      width: 14px;
      height: 26px;
      border-radius: 3px;
      opacity: 0.95;
      animation: fall linear forwards;
    }

    .emojiBurst {
      position: absolute;
      left: 50%;
      top: 45%;
      transform: translate(-50%, -50%) scale(0.2);
      font-size: clamp(90px, 26vw, 180px);
      opacity: 0;
      animation: emojiPop 1.1s ease forwards;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.35));
    }

    @keyframes fall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(120vh) rotate(720deg);
        opacity: 0.85;
      }
    }

    @keyframes emojiPop {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
      }
      20% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.25);
      }
      55% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -56%) scale(1.1);
      }
    }

    @media (max-width: 430px) {
      body {
        padding: 16px 12px 26px;
      }

      .container {
        gap: 14px;
      }

      .card {
        border-radius: 24px;
        padding: 16px 14px 18px;
      }

      .buttons {
        gap: 12px;
      }
    }
  </style>
</head>

<body>
  <div id="effectsLayer" class="effectsLayer"></div>

  <h1>Doost Meter ❤️</h1>

  <div class="container">
    <div class="card">
      <input id="leftName" class="nameInput" value="Bahar" />
      <div class="score" id="leftScore">0</div>
      <div class="buttons">
        <button class="scoreBtn" onclick="changeScore('left', -1)">−</button>
        <button class="scoreBtn" onclick="changeScore('left', 1)">+</button>
      </div>
    </div>

    <div class="heart">❤️</div>

    <div class="card">
      <input id="rightName" class="nameInput" value="Mahmoud" />
      <div class="score" id="rightScore">0</div>
      <div class="buttons">
        <button class="scoreBtn" onclick="changeScore('right', -1)">−</button>
        <button class="scoreBtn" onclick="changeScore('right', 1)">+</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue,
      update,
      get,
      set
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD8-GMbi2DryUhdAxwmMUxUrdIHITKe3U4",
      authDomain: "doost-meter.firebaseapp.com",
      databaseURL: "https://doost-meter-default-rtdb.firebaseio.com",
      projectId: "doost-meter",
      storageBucket: "doost-meter.firebasestorage.app",
      messagingSenderId: "373813005835",
      appId: "1:373813005835:web:b2feb8a6e4ad668b45410e",
      measurementId: "G-8W5GTN7LZ4"
    };

    const defaultState = {
      leftName: "Bahar",
      rightName: "Mahmoud",
      leftScore: 0,
      rightScore: 0
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const meterRef = ref(db, "doost-meter/main");

    let currentData = { ...defaultState };

    const leftNameInput = document.getElementById("leftName");
    const rightNameInput = document.getElementById("rightName");
    const leftScoreEl = document.getElementById("leftScore");
    const rightScoreEl = document.getElementById("rightScore");
    const effectsLayer = document.getElementById("effectsLayer");

    const milestoneSound = new Audio("./celebration.m4a");
    milestoneSound.preload = "auto";

    function playMilestoneSound() {
      try {
        milestoneSound.pause();
        milestoneSound.currentTime = 0;
        milestoneSound.play();
      } catch (error) {
        console.log("Sound could not play:", error);
      }
    }

    function render(data) {
      currentData = { ...defaultState, ...data };
      leftNameInput.value = currentData.leftName;
      rightNameInput.value = currentData.rightName;
      leftScoreEl.textContent = currentData.leftScore;
      rightScoreEl.textContent = currentData.rightScore;
    }

    function triggerConfetti() {
      const pieces = 28;
      const colors = ["#ff4d6d", "#ffd166", "#06d6a0", "#4cc9f0", "#f72585", "#bde0fe"];

      for (let i = 0; i < pieces; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = `${1.8 + Math.random() * 1.7}s`;
        piece.style.transform = `translateY(0) rotate(${Math.random() * 360}deg)`;
        effectsLayer.appendChild(piece);

        setTimeout(() => {
          piece.remove();
        }, 3800);
      }
    }

    function triggerDislikeEmoji() {
      const emoji = document.createElement("div");
      emoji.className = "emojiBurst";
      emoji.textContent = "😒";
      effectsLayer.appendChild(emoji);

      setTimeout(() => {
        emoji.remove();
      }, 1200);
    }

    async function connect() {
      const snapshot = await get(meterRef);

      if (!snapshot.exists()) {
        await set(meterRef, defaultState);
      }

      onValue(meterRef, (snap) => {
        render(snap.val() || defaultState);
      });
    }

    window.changeScore = async function (side, delta) {
      const key = side === "left" ? "leftScore" : "rightScore";
      const currentValue = Number(currentData[key] || 0);
      const newValue = currentValue + delta;

      if (delta > 0) {
        triggerConfetti();
      } else if (delta < 0) {
        triggerDislikeEmoji();
      }

      if (delta > 0 && newValue > 0 && newValue % 10 === 0) {
        playMilestoneSound();
      }

      await update(meterRef, {
        ...currentData,
        [key]: newValue
      });
    };

    leftNameInput.addEventListener("change", async () => {
      await update(meterRef, {
        ...currentData,
        leftName: leftNameInput.value || "Bahar"
      });
    });

    rightNameInput.addEventListener("change", async () => {
      await update(meterRef, {
        ...currentData,
        rightName: rightNameInput.value || "Mahmoud"
      });
    });

    connect();
  </script>
</body>
</html>
